{% extends "base.html" %} {% block content %}

<!-- Page header -->
<div
  class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom"
>
  <div>
    <h5 class="mb-0 fw-semibold">Nuevo Producto</h5>
    <small class="text-secondary">Completa los datos del producto</small>
  </div>
</div>

<!-- Bootstrap Card Form -->
<div class="card border-0 shadow-sm" style="max-width: 560px">
  <div class="card-body p-4">
    <form action="/save" method="POST">
      <div class="mb-3">
        <label class="form-label text-secondary small">NOMBRE</label>
        <input
          type="text"
          name="nombre"
          class="form-control"
          placeholder="Ej. Laptop Lenovo ThinkPad"
          required
        />
      </div>

      <div class="mb-3">
        <label class="form-label text-secondary small">CATEGORÍA</label>
        <input
          type="text"
          name="categoria"
          class="form-control"
          placeholder="Ej. Laptops, Periféricos, Cables"
          required
        />
      </div>

      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="form-label text-secondary small">PRECIO (Bs.)</label>
          <input
            type="number"
            name="precio"
            step="0.01"
            min="0"
            class="form-control"
            placeholder="0.00"
            required
          />
        </div>
        <div class="col-6">
          <label class="form-label text-secondary small">STOCK</label>
          <input
            type="number"
            name="stock"
            min="0"
            class="form-control"
            placeholder="0"
            required
          />
        </div>
      </div>

      <div class="d-flex gap-2 pt-3 border-top">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i> Guardar
        </button>
        <a href="/" class="btn btn-outline-secondary">
          <i class="bi bi-x-lg me-1"></i> Cancelar
        </a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
